<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Parking - Smart Parking Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh !important;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <header id="main-header">
        <div class="nav-content">
            <a href="/" class="logo-link">
                <img src="{{ url_for('static', filename='gopark icon.png') }}" alt="GoPark Logo" class="logo-img">
                <span class="logo-text">GoPark</span>
            </a>
            
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav-links" id="nav-links">
                <div class="user-controls">
                    {% if username %}
                    <span class="user-welcome">Hi, {{ username }}</span>
                    {% if mode == 'owner' %}
                    <a href="{{ url_for('list_space') }}" class="btn btn-primary">List a Space</a>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-accent">Dashboard</a>
                    <a href="{{ url_for('toggle_mode') }}" class="btn btn-purple">Switch to Driver</a>
                    {% else %}
                    <a href="{{ url_for('dashboard') }}" class="btn btn-accent">My Bookings</a>
                    <a href="{{ url_for('toggle_mode') }}" class="btn btn-purple">Switch to Owner</a>
                    {% endif %}
                    <a href="{{ url_for('logout') }}" class="btn btn-logout">Logout</a>
                    {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-outline">Login</a>
                    <a href="{{ url_for('signup') }}" class="btn btn-primary">Sign Up</a>
                    {% endif %}
                </div>
            </nav>
        </div>
        <div class="map-search-bar" style="margin-top: 15px; display: flex; justify-content: center; gap: 10px; padding: 0 5%;">
            <div class="search-input-wrapper" style="max-width: 500px; flex: 1; position: relative;">
                <i style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #a4b0be; font-style: normal;">🔍</i>
                <input type="text" id="search-input" placeholder="Search for another location..." style="width: 100%; padding: 10px 10px 10px 40px; border: 1px solid #dfe4ea; border-radius: 4px;">
            </div>
            <button onclick="searchLocation()" class="btn btn-accent" style="border-radius: 4px; padding: 10px 20px;">Search</button>
        </div>
        <p id="status">Locating you...</p>
    </header>

    <main style="flex-direction: row; flex: 1; overflow: hidden; display: flex;">
        <div id="map" style="flex: 2; height: 100%; border-bottom: none; border-right: 2px solid #ccc;"></div>
        <div class="parking-section" style="flex: 1; height: 100%; display: flex; flex-direction: column;">
            <h2 style="padding: 15px 20px; font-size: 1.3rem; color: #333; margin: 0; background: white; border-bottom: 1px solid #eee;">Nearby Parking Spots</h2>
            <div id="parking-list-container" class="cards-container" style="flex: 1; overflow-y: auto; padding: 15px; grid-template-columns: 1fr;">
                <p style="color: #777;">Loading nearby spots...</p>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
